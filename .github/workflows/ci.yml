name: CI & Release

on:
  push:
    branches: [main]
    tags: ['v*'] # Triggers when you push a tag starting with 'v'
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest
          pip install -r requirements.txt || true

      - name: Run tests
        run: pytest test_app.py -v

  # New Job: Only runs on tags
  binary-build:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Build Tools
        run: |
          pip install pyinstaller -r requirements.txt || true

      - name: Build Executable
        run: pyinstaller --onefile app.py

      - name: Upload Binary to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/app  # This is the "binary" created by PyInstaller
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
