name: CI & Release

on:
  push:
    branches: [main]
    tags: ['v*'] # Triggers when you push a tag starting with 'v'
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest
          pip install -r requirements.txt || true

      - name: Run tests
        run: pytest test_app.py -v

  # New Job: Only runs on tags
binary-build:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          # Install pyinstaller specifically first
          pip install pyinstaller
          # Only try requirements if the file actually exists
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build Executable
        run: python -m PyInstaller --onefile app.py

      - name: Upload Binary to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
